{% extends 'base.html' %}

{% block head %}
    <title>{{ category }} converter</title>

{% endblock %}


{% block body %}
<div class="content">
    <h1>Unit Converter</h1>

    <nav class="navbar">
        <a href="/length">Length</a>
        <a href="/weight">Weight</a>
        <a href="/temperature">Temperature</a>
    </nav>

    {% if result is not none %}
        <div class="result">
            <h2>Result of your calculation</h2>
            <p class ="display_result">{{ result }}</p>
            <div class="actions">
                <a href="/{{ category }}" class="back-button">Reset</a>
            </div>
        </div>

    {% else %}
        <form action="" method="POST">
            <label for="user_value">Enter the {{ category }} to convert</label>
            <input type="number" name="value" id="user_value" step="any" required>

            <label for="unit_from">Unit to Convert from</label>
            <select name="unit_from" id="unit_from">
                {% for unit in units %}
                    <option value="{{ unit }}">{{ unit }}</option>
                {% endfor %}
            </select>
            <label for="unit_to">Unit to Convert to</label>
            <select name="unit_to" id="unit_to">
                {% for unit in units %}
                    <option value="{{ unit }}">{{ unit }}</option>
                {% endfor %}
            </select>
            <button type="submit">Convert</button>
        </form>

    {% endif %}

</div>
{% endblock %}
